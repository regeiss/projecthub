<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#3730a3"/>

  <!-- Hub and spoke — representa rede de projetos / CPM -->

  <!-- Linhas das pontas ao centro -->
  <line x1="16" y1="5"  x2="16" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="27" y1="16" x2="19" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="16" y1="27" x2="16" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="5"  y1="16" x2="13" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>

  <!-- Nós satélite -->
  <circle cx="16" cy="5"  r="2.2" fill="white" opacity="0.7"/>
  <circle cx="27" cy="16" r="2.2" fill="white" opacity="0.7"/>
  <circle cx="16" cy="27" r="2.2" fill="white" opacity="0.7"/>
  <circle cx="5"  cy="16" r="2.2" fill="white" opacity="0.7"/>

  <!-- Nó central (hub) -->
  <circle cx="16" cy="16" r="4" fill="white"/>
</svg>
