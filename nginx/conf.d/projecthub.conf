# =============================================================================
# ProjectHub — conf.d/projecthub.conf
# Server block HTTP (desenvolvimento) / HTTPS (produção via SSL termination)
# =============================================================================

upstream api_backend {
    server api:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP — porta 80
# Em produção com SSL: adicione bloco HTTPS e redirecione HTTP → HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Healthcheck nginx (sem log)
    location = /nginx-health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # API REST (Daphne / Django)
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
    }

    # ---------------------------------------------------------------------------
    # WebSocket — Django Channels / Yjs collaboration
    # ---------------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket pode ficar aberto por horas (wiki colaborativo)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---------------------------------------------------------------------------
    # Django Admin
    # ---------------------------------------------------------------------------
    location /admin/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------------------------
    # Arquivos estáticos Django (collectstatic)
    # ---------------------------------------------------------------------------
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Uploads / mídia
    # ---------------------------------------------------------------------------
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "private";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Assets do Vite com hash no nome — cache imutável por 1 ano
    # ---------------------------------------------------------------------------
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        root /var/www/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Frontend React (SPA) — todas as rotas → index.html
    # Deve ficar por último
    # ---------------------------------------------------------------------------
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
        # index.html sem cache (versão sempre atualizada)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        add_header Expires 0;
    }
}
