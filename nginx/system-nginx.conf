# =============================================================================
# Configuração para o Nginx do SISTEMA (não o container Docker)
# Salvar em: /etc/nginx/sites-available/projecthub
# Ativar com: ln -s /etc/nginx/sites-available/projecthub /etc/nginx/sites-enabled/
# ou copiar para /etc/nginx/conf.d/projecthub.conf
# =============================================================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name dev-projecthub.novohamburgo.rs.gov.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev-projecthub.novohamburgo.rs.gov.br;

    # Certificados SSL (ajuste os caminhos)
    # Se usar Let's Encrypt:
    ssl_certificate     /etc/letsencrypt/live/dev-projecthub.novohamburgo.rs.gov.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-projecthub.novohamburgo.rs.gov.br/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Proxy para o container Docker Nginx na porta 8090
    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (wiki colaborativo, notificações, kanban)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
