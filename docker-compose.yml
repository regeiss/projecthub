# =============================================================================
# ProjectHub — Docker Compose
# Stack: Django + React + PostgreSQL + Redis + Celery + Nginx
# =============================================================================

x-django-env: &django-env
  environment:
    # Django
    DJANGO_SETTINGS_MODULE: config.settings.production
    SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    DEBUG: ${DEBUG:-False}
    ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

    # Banco de dados
    DATABASE_URL: postgresql://${POSTGRES_USER:-projecthub}:${POSTGRES_PASSWORD:-projecthub}@db:5432/${POSTGRES_DB:-projecthub}

    # Redis
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2

    # Keycloak OIDC
    KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
    KEYCLOAK_REALM: ${KEYCLOAK_REALM:-projecthub}
    KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-projecthub-backend}
    KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
    KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
    KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

    # OCI Object Storage (S3-compatible)
    AWS_ACCESS_KEY_ID: ${OCI_ACCESS_KEY:-}
    AWS_SECRET_ACCESS_KEY: ${OCI_SECRET_KEY:-}
    AWS_STORAGE_BUCKET_NAME: ${OCI_BUCKET:-projecthub-media}
    AWS_S3_ENDPOINT_URL: ${OCI_S3_ENDPOINT:-}
    AWS_S3_REGION_NAME: ${OCI_REGION:-sa-saopaulo-1}

    # E-mail
    EMAIL_HOST: ${EMAIL_HOST:-smtp.prefeitura.nh.rs.gov.br}
    EMAIL_PORT: ${EMAIL_PORT:-587}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-projecthub@prefeitura.nh.rs.gov.br}

# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Banco de dados PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: projecthub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projecthub}
      POSTGRES_USER: ${POSTGRES_USER:-projecthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projecthub}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"           # Remover em produção
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projecthub} -d ${POSTGRES_DB:-projecthub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Redis — Cache, filas Celery, sessões, WebSocket channel layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: projecthub_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"           # Remover em produção
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Django — API REST + Django Channels (WebSocket)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projecthub_api
    restart: unless-stopped
    <<: *django-env
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"           # Remover em produção (acessar via Nginx)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Celery Worker — Tarefas assíncronas (CPM, notificações, sync)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projecthub_celery_worker
    restart: unless-stopped
    <<: *django-env
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=4
      --queues=default,cpm,notifications,sync
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Celery Beat — Agendador de tarefas periódicas
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projecthub_celery_beat
    restart: unless-stopped
    <<: *django-env
    command: >
      celery -A config beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Flower — Monitoramento do Celery (opcional, desabilitar em produção)
  # ---------------------------------------------------------------------------
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projecthub_flower
    restart: unless-stopped
    <<: *django-env
    command: >
      celery -A config flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    profiles:
      - monitoring               # Só sobe com: docker compose --profile monitoring up
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Frontend React (build estático servido pelo Nginx)
  # Em desenvolvimento usar: npm run dev (Vite dev server na porta 5173)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost/ws}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-projecthub}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID_FRONTEND:-projecthub-frontend}
    container_name: projecthub_frontend
    restart: unless-stopped
    volumes:
      - frontend_build:/app/dist
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy, serve estáticos e roteamento
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: projecthub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - frontend_build:/var/www/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # Certificados SSL
    depends_on:
      - api
      - frontend
    networks:
      - projecthub_net

  # ---------------------------------------------------------------------------
  # Keycloak — SSO / OIDC (se não tiver instância externa)
  # Comentar este bloco se já tiver Keycloak rodando no OCI
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: projecthub_keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-projecthub}
      KC_DB_USERNAME: ${POSTGRES_USER:-projecthub}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-projecthub}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - keycloak                 # Só sobe com: docker compose --profile keycloak up
    networks:
      - projecthub_net

# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  frontend_build:
    driver: local

networks:
  projecthub_net:
    driver: bridge
